# ============================================================
# General / Server Options
# ============================================================

# Enable mouse support and focus events
set -g mouse on
set -s focus-events on

# UTF-8 support
set -q -g status-utf8 on
setw -q -g utf8 on

# Key modes
set -g status-keys emacs
setw -g mode-keys vi

set -s escape-time 0
set -g history-limit 500000
set -s set-clipboard external
set -g allow-passthrough on
set -g visual-activity off
set -s extended-keys on
set -g extended-keys-format csi-u

# Terminal & color
if-shell 'test -n "$KITTY_PID"' \
  'set -g default-terminal "xterm-kitty"' \
  'set -g default-terminal "tmux-256color"'
set -as terminal-features ",*:RGB"

# Window naming / titles
set -g automatic-rename on
set -g automatic-rename-format "#{b:pane_current_path}"
set -g set-titles on

# Misc display timing
set -g display-panes-time 1000
set -g display-time 1000
set -g clock-mode-style 24

# ============================================================
# Pane Navigation & Movement
# ============================================================
# Select pane (vi-style)
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Select pane (repeatable, with Ctrl)
bind -r C-h select-pane -L
bind -r C-j select-pane -D
bind -r C-k select-pane -U
bind -r C-l select-pane -R

# Swap pane in a direction
bind H "select-pane -m; select-pane -L; swap-pane; select-pane -L; select-pane -M"
bind J "select-pane -m; select-pane -D; swap-pane; select-pane -D; select-pane -M"
bind K "select-pane -m; select-pane -U; swap-pane; select-pane -U; select-pane -M"
bind L "select-pane -m; select-pane -R; swap-pane; select-pane -R; select-pane -M"

bind ";" last-pane

# ============================================================
# Pane & Window Creation / Management
# ============================================================
# Splits (inherit current path)
bind s split-window -v -c "#{pane_current_path}"
bind v split-window -h -c "#{pane_current_path}"

# New window
bind c new-window -c "#{pane_current_path}"
bind t new-window -c "#{pane_current_path}"

# Kill
bind X kill-window
bind x kill-pane

# Break / join
bind b break-pane
bind m command-prompt -p "join pane to window:" "join-pane -t ':%%'"

# ============================================================
# Window Navigation & Ordering
# ============================================================
bind a last-window
bind A switch-client -l
bind n next-window
bind N previous-window
bind p previous-window
bind -r C-n next-window
bind -r C-p previous-window

# Move window order (repeatable)
bind -r M-n swap-window -t +1\; select-window -t +1
bind -r M-p swap-window -t -1\; select-window -t -1

# ============================================================
# Renaming
# ============================================================
bind , command-prompt -I "#W" "rename-window '%%'"
bind . command-prompt -I "#S" "rename-session '%%'"

# ============================================================
# Copy Mode (vi)
# ============================================================
bind \\ copy-mode
bind P paste-buffer

# Exit copy-mode
bind -T copy-mode-vi i send -X cancel
bind -T copy-mode-vi a send -X cancel
bind -T copy-mode-vi q send -X cancel
bind -T copy-mode-vi Escape send -X cancel
bind -T copy-mode-vi Enter send -X cancel

# Selection
unbind-key -T copy-mode-vi v
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi V send -X select-line
bind -T copy-mode-vi C-v send -X rectangle-toggle
bind -T copy-mode-vi d send -X clear-selection

# Paste inside copy-mode
unbind -T copy-mode-vi p
bind -T copy-mode-vi p paste-buffer \; send -X cancel

# Yank to system clipboard
unbind-key -T copy-mode-vi y
bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel \
  "command -v pbcopy >/dev/null && pbcopy || xclip -selection clipboard 2>/dev/null || xsel -ib"

# ============================================================
# Utilities / Popups
# ============================================================
# Save pane scrollback to file
bind C-w run-shell 'tmux capture-pane -p -S - -E - > /tmp/tmux-capture-$(date +"%Y%m%d-%H%M%S").txt' \; display 'Pane saved to /tmp/tmux-capture-YYYYMMDD-HHMMSS.txt'

# Stats popup
bind i display-popup -w 50 -h 13 -E '~/.config/tmux/scripts/stats_popup.sh'

# List keybindings
bind ? list-keys -T prefix

# ============================================================
# Status Bar
# ============================================================
set -g status on
set -g status-interval 0            # 不自动刷新
set -g status-style "fg=#718CA1,bg=default"
set -g status-left-length  150
set -g status-right-length 150
set -g status-left ""
set -g status-right "#[fg=#333F4A]#h #[fg=#333F4A]• #[fg=#333F4A]#S"

# Window status entries
set -g window-status-format         "#[fg=#333F4A,bg=default] #I:#W#F "
set -g window-status-current-format "#[fg=#B7C5D3] #I:#W#F "
set -g window-status-style          bg=default
set -g window-status-current-style  bg=default
set -g window-status-last-style     "fg=#79C2FA,bg=default,none"
set -g window-status-activity-style "fg=#79C2FA,bg=default,none"
set -g window-status-bell-style     "fg=#79C2FA,bg=default,none"
set -g window-status-separator      ""

# ============================================================
# Theming (borders, messages, modes)
# ============================================================
set -g pane-active-border-style "fg=#79C2FA,bg=default"
set -g message-style            "fg=#79C2FA,bg=#262626"
set -g message-command-style    "fg=#79C2FA,bg=#262626"
set -g mode-style               "bg=#79C2FA,fg=#626262"

# ============================================================
# Mode Indicator Plugin
# ============================================================
set -g @mode_indicator_prefix_prompt ' WAIT '
set -g @mode_indicator_copy_prompt   ' COPY '
set -g @mode_indicator_sync_prompt   ' SYNC '
set -g @mode_indicator_empty_prompt  ' TMUX '
set -g @mode_indicator_prefix_mode_style 'bg=#9ece6a,fg=#1a1b26'
set -g @mode_indicator_copy_mode_style   'bg=#ff9e64,fg=#1a1b26'
set -g @mode_indicator_sync_mode_style   'bg=#f7768e,fg=#1a1b26'
set -g @mode_indicator_empty_mode_style  'bg=#444b6a,fg=#a9b1d6'
